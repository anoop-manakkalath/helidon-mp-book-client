jsonb.formatting=false
%dev.jsonb.formatting=true

mp.jwt.verify.publickey.location=/publicKey.pem
mp.jwt.verify.issuer=https://authbook.dev

# This is CRITICAL: Ensure your Login endpoint remains open
security.jersey.resource-config.1.path=/auth/login
security.jersey.resource-config.1.methods=POST
security.jersey.resource-config.1.permit-all=true

# Permit access to the raw OpenAPI YAML/JSON
security.jersey.resource-config.1.path=/openapi
security.jersey.resource-config.1.permit-all=true

# Permit access to the Swagger UI HTML and assets
security.jersey.resource-config.2.path=/openapi/ui
security.jersey.resource-config.2.permit-all=true
