[project]
groupId = "com.example"
artifactId = "helidon-mp-book-client"
version = "1.5.0"

[properties]
maven.compiler.release = "25"
helidon.version = "4.4.1"
lombok.version = "1.18.44"
mapstruct.version = "1.6.3"
io.helidon.logging.provider = "log4j"

[dependencies]

[[dependencies]]
groupId = "io.helidon.microprofile.bundles"
artifactId = "helidon-microprofile"
version = "${helidon.version}"

[[dependencies]]
groupId = "io.helidon.integrations.cdi"
artifactId = "helidon-integrations-cdi-jta"
version = "${helidon.version}"

[[dependencies]]
groupId = "io.helidon.microprofile.jwt"
artifactId = "helidon-microprofile-jwt-auth"
version = "${helidon.version}"

[[dependencies]]
groupId = "io.helidon.microprofile"
artifactId = "helidon-microprofile-security"
version = "${helidon.version}"

[[dependencies]]
groupId = "io.helidon.logging"
artifactId = "helidon-logging-log4j"
version = "${helidon.version}"

[[dependencies]]
groupId = "io.helidon.microprofile.openapi"
artifactId = "helidon-microprofile-openapi"
version = "${helidon.version}"

[[dependencies]]
groupId = "io.helidon.integrations.openapi-ui"
artifactId = "helidon-integrations-openapi-ui"
version = "${helidon.version}"
scope = "runtime"

[[dependencies]]
groupId = "org.eclipse"
artifactId = "yasson"
version = "3.0.4"

[[dependencies]]
groupId = "org.hibernate.orm"
artifactId = "hibernate-core"
version = "7.3.0.Final"

[[dependencies]]
groupId = "com.nimbusds"
artifactId = "nimbus-jose-jwt"
version = "9.37.3"

[[dependencies]]
groupId = "org.eclipse.microprofile.openapi"
artifactId = "microprofile-openapi-api"
version = "3.1.2"
scope = "provided"

[[dependencies]]
groupId = "org.apache.commons"
artifactId = "commons-lang3"
version = "3.20.0"
scope = "compile"

[[dependencies]]
groupId = "jakarta.inject"
artifactId = "jakarta.inject-api"
version = "2.0.1"

[[dependencies]]
groupId = "jakarta.persistence"
artifactId = "jakarta.persistence-api"
version = "3.2.0"

[[dependencies]]
groupId = "com.h2database"
artifactId = "h2"
version = "2.4.240"
scope = "runtime"

[[dependencies]]
groupId = "org.projectlombok"
artifactId = "lombok"
version = "${lombok.version}"
scope = "provided"

[[dependencies]]
groupId = "org.mapstruct"
artifactId = "mapstruct"
version = "${mapstruct.version}"
scope = "compile"

[[dependencies]]
groupId = "org.projectlombok"
artifactId = "lombok-mapstruct-binding"
version = "0.2.0"
scope = "provided"

[[dependencies]]
groupId = "org.apache.logging.log4j"
artifactId = "log4j-slf4j2-impl"
version = "2.25.3"

[[dependencies]]
groupId = "org.apache.logging.log4j"
artifactId = "log4j-jul"
version = "2.25.3"

[[dependencies]]
groupId = "org.apache.logging.log4j"
artifactId = "log4j-core"
version = "2.25.3"

[[dependencies]]
groupId = "org.junit.jupiter"
artifactId = "junit-jupiter-api"
version = "6.0.3"
scope = "test"

[[dependencies]]
groupId = "org.mockito"
artifactId = "mockito-junit-jupiter"
version = "5.23.0"
scope = "test"

[build]

[[plugins]]
groupId = "org.apache.maven.plugins"
artifactId = "maven-compiler-plugin"
version = "3.15.0"
[plugins.configuration]
release = "${maven.compiler.release}"
annotationProcessorPaths = [
  { groupId = "org.projectlombok", artifactId = "lombok", version = "${lombok.version}" },
  { groupId = "org.mapstruct", artifactId = "mapstruct-processor", version = "${mapstruct.version}" }
]

[[plugins]]
groupId = "io.smallrye"
artifactId = "jandex-maven-plugin"
version = "3.5.3"
executions = [
  { id = "make-index", goals = ["jandex"] }
]

[[plugins]]
groupId = "org.apache.maven.plugins"
artifactId = "maven-dependency-plugin"
version = "3.10.0"
executions = [
  { id = "copy-dependencies", phase = "package", goals = ["copy-dependencies"], configuration = { outputDirectory = "${project.build.directory}/libs", includeScope = "runtime" } }
]

[[plugins]]
groupId = "org.apache.maven.plugins"
artifactId = "maven-jar-plugin"
version = "3.5.0"
[plugins.configuration.archive.manifest]
mainClass = "BookApplication"
addClasspath = true
classpathPrefix = "libs/"

[profiles]

[[profiles]]
id = "dev"
[profiles.activation.property]
name = "mp.config.profile"
value = "dev"

[[profiles.build.plugins]]
artifactId = "maven-antrun-plugin"
version = "3.2.0"
executions = [
  { id = "copy-db-folder", phase = "process-resources", goals = ["run"], configuration = { target = { copy = { todir = "${project.build.directory}/db", overwrite = true, fileset = { dir = "${project.basedir}/db" } } } } }
]
